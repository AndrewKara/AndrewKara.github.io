<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APQ Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #333;
            margin: 0 auto 2.5rem;
        }

        .apps {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media (min-width: 480px) {
            .apps { grid-template-columns: 1fr 1fr; }
        }

        .apps a {
            display: block;
            padding: 1.25rem 1rem;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            background: #111;
            text-decoration: none;
            color: #e0e0e0;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .apps a:hover {
            border-color: #4A7C59;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(74, 124, 89, 0.1);
            text-decoration: none;
        }

        .app-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .app-desc {
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>APQ Labs</h1>
        <p class="tagline">Small, focused apps.</p>
        <div class="divider"></div>
        <ul class="apps">
            <li><a href="/shed/">
                <div class="app-name">Shed</div>
                <div class="app-desc">Reptile Tracker</div>
            </a></li>
            <li><a href="/frag/">
                <div class="app-name">Frag</div>
                <div class="app-desc">Reef Tank Manager</div>
            </a></li>
            <li><a href="/chaff/">
                <div class="app-name">Chaff</div>
                <div class="app-desc">Coffee Roast Log</div>
            </a></li>
            <li><a href="/pinset/">
                <div class="app-name">Pinset</div>
                <div class="app-desc">Mushroom Grow Tracker</div>
            </a></li>
            <li><a href="/locus/">
                <div class="app-name">Locus</div>
                <div class="app-desc">Focus Timer</div>
            </a></li>
            <li><a href="/resurface/">
                <div class="app-name">Resurface</div>
                <div class="app-desc">Save for Later</div>
            </a></li>
        </ul>
    </div>
</body>
</html>
